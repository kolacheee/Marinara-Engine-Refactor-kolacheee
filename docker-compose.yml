services:
  marinara-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: marinara-engine-server:local
    container_name: marinara-engine-server
    restart: unless-stopped
    environment:
      MARINARA_SERVER_ADDR: 0.0.0.0:8787
      MARINARA_DATA_DIR: /data
      MARINARA_SERVER_BASIC_AUTH: ${MARINARA_SERVER_BASIC_AUTH:-}
      MARINARA_SERVER_API_KEY: ${MARINARA_SERVER_API_KEY:-}
      MARINARA_SERVER_ALLOWED_ORIGINS: ${MARINARA_SERVER_ALLOWED_ORIGINS:-http://localhost:1420,http://127.0.0.1:1420,tauri://localhost,http://tauri.localhost}
    ports:
      - "8787:8787"
    volumes:
      - marinara-server-data:/data

volumes:
  marinara-server-data:
